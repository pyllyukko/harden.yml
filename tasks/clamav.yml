---
- name: ClamAV
  become: true
  tags: clamav
  # Skip ClamAV installation completely if there's less than 3 GiB of memory
  # https://docs.clamav.net/manual/Installing/Docker.html#memory-ram-requirements
  when: ansible_facts['memtotal_mb'] >= 3072
  block:
    - name: Install ClamAV (Debian) (non-x86_64 or aarch64)
      ansible.builtin.apt:
        name: ['clamav', 'clamav-daemon']
        update_cache: true
      when: (ansible_facts['distribution'] == "Debian" or ansible_facts['distribution'] == "Kali") and ansible_facts['architecture'] not in ["x86_64", "aarch64"]
      tags:
        - packages
        - services
        - debian

    - name: ClamAV Debian x86_64 and aarch64
      when: ansible_facts['distribution'] in ["Debian", "Kali", "Ubuntu"] and ansible_facts['architecture'] in ["x86_64", "aarch64"]
      tags:
        - packages
        - debian
      block:
        - name: Check currently installed version of ClamAV
          tags: check
          ansible.builtin.package_facts:
            manager: apt
        - name: Uninstall ClamAV (Debian) (x86_64 and aarch64)
          ansible.builtin.apt:
            name: ['clamav', 'clamav-daemon', 'clamav-base', 'clamav-freshclam', 'libclamav12', 'clamav-data', 'clamdscan', 'clamav-doc']
            state: absent
            purge: true
          tags:
            - services
            # This is commented out so that accounts tag can be run on it's own
            #- accounts  # postrm removed the ClamAV user
          when:
            - '"clamav" in ansible_facts.packages'
            - ansible_facts.packages['clamav'][0].origin == "Debian"
        - name: Create group for ClamAV
          # This is commented out so that accounts tag can be run on it's own
          #tags: accounts
          ansible.builtin.group:
            name: clamav
            state: present
            system: true
        - name: Create user account for ClamAV
          # This is commented out so that accounts tag can be run on it's own
          #tags: accounts
          ansible.builtin.user:
            name: clamav
            group: clamav
            shell: '{{ nologin }}'
            system: true
            create_home: false
            home: /var/lib/clamav
            password_lock: true
            state: present
            expires: '{{ 60 * 60 * 24 }}'
            append: false
            move_home: false
        - name: Download & install ClamAV
          # TODO: The downloading is not idempotent in GH Actions for some reason. At least with /var/cache/apt/archives/ as dest dir.
          tags: molecule-idempotence-notest
          block:
            - name: Check latest ClamAV version
              ansible.builtin.uri:
                url: https://api.github.com/repos/Cisco-Talos/clamav/releases/latest
                method: GET
              register: clamav_latest
            # TODO: Download PGP signature and verify it
            - name: Download ClamAV
              ansible.builtin.get_url:
                url: "{{ clamav_latest.json | json_query(latest_package) | first }}"
                dest: /var/cache/apt/archives/
                owner: root
                group: root
                mode: '0600'
              vars:
                latest_package: "assets[?ends_with(name,'.linux.{{ ansible_architecture }}.deb')].browser_download_url"
              register: clamav_download
            - name: Install ClamAV (x86_64 and aarch64)
              ansible.builtin.apt:
                deb: "{{ clamav_download.dest }}"
              #notify: Freshclam

    - name: Determine ClamAV sysconfdir
      ansible.builtin.shell: set -o pipefail; {{ clamav_location }}/clamconf | awk '/^Checking configuration files in/{print$5}'
      register: clamav_sysconfdir
      tags: check
      args:
        executable: /bin/bash
      changed_when: false
    - name: Verify ClamAV sysconfdir
      ansible.builtin.assert:
        that:
          - clamav_sysconfdir.stdout | length > 0
          - clamav_sysconfdir.stdout | regex_search('/etc') | length > 0
      tags: check
    - name: Generate fresh configs
      ansible.builtin.shell: "{{ clamav_location }}/clamconf -g {{ item }}.conf 1>{{ clamav_sysconfdir.stdout }}/{{ item }}.conf.new"
      with_items:
        - freshclam
        - clamd
      tags: configuration
      args:
        executable: /bin/bash
        creates: "{{ clamav_sysconfdir.stdout }}/{{ item }}.conf.new"
    - name: Comment out Example lines
      ansible.builtin.replace:
        path: '{{ clamav_sysconfdir.stdout }}/{{ item }}.conf.new'
        regexp: '^(Example)$'
        replace: '#\g<1>'
      with_items:
        - freshclam
        - clamd
      tags: configuration
    - name: mkdir {{ clamav.rundir }}
      ansible.builtin.file:
        path: '{{ clamav.rundir }}'
        state: directory
        owner: clamav
        group: clamav
        mode: '{{ clamav.rundir_mode }}'
    # https://docs.clamav.net/manual/Usage/Configuration.html#clamdconf
    - name: Configure ClamAV
      ansible.builtin.replace:
        path: '{{ clamav_sysconfdir.stdout }}/clamd.conf.new'
        regexp: '^#?({{ item.key }} ).*$'
        replace: '\g<1>{{ item.value }}'
        validate: '/bin/grep "^{{ item.key }} {{ item.value }}$" %s'
      with_dict: "{{ clamav_settings }}"
      vars:
        clamav_settings:
          LogTime: "no"
          LogSyslog: "yes"
          LogFacility: LOG_LOCAL6
          ExtendedDetectionInfo: "yes"
          CrossFilesystems: "yes"
          DetectPUA: "yes"
          HeuristicAlerts: "yes"
          HeuristicScanPrecedence: "no"
          AlertBrokenExecutables: "yes"
          AlertBrokenMedia: "yes"
          ScanPE: "yes"
          ScanELF: "yes"
          ScanOLE2: "yes"
          ScanPDF: "yes"
          ScanSWF: "yes"
          ScanXMLDOCS: "yes"
          ScanHWP3: "yes"
          ScanMail: "yes"
          PhishingSignatures: "yes"
          PhishingScanURLs: "yes"
          ScanHTML: "yes"
          ScanArchive: "yes"
          Bytecode: "yes"
          BytecodeSecurity: Paranoid
          LocalSocket: "{{ clamav['socket'] }}"
          LocalSocketMode: 660
          PidFile: "{{ clamav['pid'] }}"
          User: clamav
          AlertOLE2Macros: "yes"
          FixStaleSocket: "yes"
          DatabaseDirectory: "{{ clamav['database'] }}"
          OnAccessExcludeUname: clamav
      tags: configuration
    # https://docs.clamav.net/manual/Usage/Configuration.html#freshclamconf
    - name: Configure freshclam
      ansible.builtin.replace:
        path: '{{ clamav_sysconfdir.stdout }}/freshclam.conf.new'
        regexp: '^#?({{ item.key }} ).*$'
        replace: '\g<1>{{ item.value }}'
        validate: '/bin/grep "^{{ item.key }} {{ item.value }}$" %s'
      with_dict: "{{ freshclam_settings }}"
      vars:
        freshclam_settings:
          LogTime: "no"
          LogFacility: LOG_LOCAL6
          ScriptedUpdates: "yes"
          CompressLocalDatabase: "no"
          ReceiveTimeout: 300
          TestDatabases: "yes"
          Bytecode: "yes"
          DatabaseMirror: database.clamav.net
          DatabaseOwner: clamav
          PidFile: "{{ clamav.rundir }}/freshclam.pid"
          DatabaseDirectory: "{{ clamav['database'] }}"
      tags: configuration
    - name: Copy new ClamAV configurations into place
      ansible.builtin.copy:
        remote_src: true
        src: '{{ clamav_sysconfdir.stdout }}/{{ item }}.conf.new'
        dest: '{{ clamav_sysconfdir.stdout }}/{{ item }}.conf'
        owner: root
        group: root
        mode: '0644'
        backup: true
      with_items:
        - freshclam
        - clamd
      tags: configuration
    - name: Remove .new configs
      ansible.builtin.file:
        path: '{{ clamav_sysconfdir.stdout }}/{{ item }}.conf.new'
        state: absent
      with_items:
        - clamd
        - freshclam
      # Do not remove them for idempotence
      tags: molecule-notest
    - name: mkdir /var/lib/clamav/
      ansible.builtin.file:
        path: /var/lib/clamav
        state: directory
        owner: clamav
        group: clamav
        mode: '0755'
    # Make the dir and the necessary files readable by other users so they can run clamscan
    - name: Make /var/lib/clamav/ +rx
      ansible.builtin.file:
        path: /var/lib/clamav/
        mode: '0755'
      tags: permissions
      register: result
      failed_when:
        - result.failed == true
        - result.state != "absent"
    # "CLD files are uncompressed and unsigned versions of the CVD that have had CDIFFs applied"
    - name: 'Make /var/lib/clamav/*.c[lv]d +r'
      ansible.builtin.file:
        path: /var/lib/clamav/{{ item }}
        mode: '0644'
      with_items:
        - daily.cld
        - daily.cvd
        - bytecode.cld
        - bytecode.cvd
        - main.cvd
        - main.cld
      register: result
      failed_when:
        - result.failed == true
        - result.state != "absent"
      tags: permissions
    # https://blog.didierstevens.com/2017/02/15/quickpost-clamav-and-zip-file-decryption/
    - name: Create a password signature file
      ansible.builtin.copy:
        dest: /var/lib/clamav/passwords.pwdb
        owner: root
        group: root
        mode: '0644'
        content: |
          ZipPasswordInfected;Engine:81-255;0;infected
      tags: configuration
    # https://docs.clamav.net/faq/faq-ignore.html
    #
    # sigs.InterServer.net.HEX.Topline.malware.string.11334.179 alerts on tables.go (1.20.5)
    #   https://www.virustotal.com/gui/file/77daba99ce1c13daa2b200ab40b3e06d484cffc1a39ec5201fd1ec8a25426c4b
    - name: Create a signature ignore list
      ansible.builtin.copy:
        dest: /var/lib/clamav/ignore_list.ign2
        owner: root
        group: root
        mode: '0644'
        content: |
          sigs.InterServer.net.HEX.Topline.malware.string.11334.179
          sigs.InterServer.net.HEX.Topline.blacklisted.ip.controller.176.223.165.12.366
          sigs.InterServer.net.HEX.Topline.blacklisted.domain.alemoney.xyz.610
      tags: configuration
    - name: Download LOLDrivers signatures
      ansible.builtin.get_url:
        url: "https://raw.githubusercontent.com/magicsword-io/LOLDrivers/refs/heads/main/detections/av/LOLDrivers.hdb"
        dest: /var/lib/clamav/LOLDrivers.hdb
        owner: root
        group: root
        mode: '0644'
    # https://docs.clamav.net/manual/Signatures/YaraRules.html
    # https://github.com/Neo23x0/signature-base (e36e80a)
    #
    # Some of the YARA rules do not work with ClamAV.
    # At least the following error messages might occure with some rules:
    #
    # LibClamAV Error: yyerror(): undefined identifier "filename"
    # LibClamAV Error: yyerror(): undefined identifier "pe"
    # LibClamAV Error: yyerror(): undefined identifier "uint32be"
    # LibClamAV Error: yyerror(): undefined identifier "hash"
    #                             undefined identifier "is__elf"
    # LibClamAV Error: parse_yara_hex_string: Single byte subpatterns unsupported in ClamAV
    # LibClamAV Warning: load_oneyara[verify]: wide modifier [w] is not supported for regex subsigs
    - name: YARA
      tags:
        - yara
        - molecule-idempotence-notest
      block:
        - name: Download YARA Forge rules
          ansible.builtin.get_url:
            url: "https://github.com/YARAHQ/yara-forge/releases/latest/download/yara-forge-rules-{{ yara_forge_variant }}.zip"
            dest: /var/lib/clamav/
            owner: root
            group: root
            mode: '0644'
          register: yara_forge
        - name: Ensure unzip is installed
          when: ansible_facts['distribution'] in ["Debian", "Kali", "Ubuntu"]
          ansible.builtin.package:
            name: unzip
            state: present
          tags:
            - packages
            - debian
        - name: Extract YARA Forge {{ yara_forge_variant }} rules
          ansible.builtin.unarchive:
            src: '{{ yara_forge.dest }}'
            dest: /var/lib/clamav/
            remote_src: true
        - name: Move yara-rules-{{ yara_forge_variant }}.yar
          ansible.builtin.copy:
            src: /var/lib/clamav/packages/{{ yara_forge_variant }}/yara-rules-{{ yara_forge_variant }}.yar
            dest: /var/lib/clamav/yara-rules-{{ yara_forge_variant }}-stripped.yar
            remote_src: true
            owner: root
            mode: '0644'
        - name: Remove /var/lib/clamav/packages
          ansible.builtin.file:
            path: /var/lib/clamav/packages
            state: absent
        - name: Remove yara-forge-rules-{{ yara_forge_variant }}.zip
          ansible.builtin.file:
            path: '{{ yara_forge.dest }}'
            state: absent
        - name: Copy strip_unsupported_yara_rules.py
          ansible.builtin.copy:
            src: strip_unsupported_yara_rules.py
            dest: /usr/local/bin/strip_unsupported_yara_rules.py
            owner: root
            mode: '0755'
        - name: Run strip_unsupported_yara_rules.py
          ansible.builtin.command: /usr/local/bin/strip_unsupported_yara_rules.py /var/lib/clamav/yara-rules-{{ yara_forge_variant }}-stripped.yar
          changed_when: true
        - name: Remove /var/lib/clamav/yara-rules-{{ yara_forge_variant }}-stripped.yar.bak
          ansible.builtin.file:
            path: /var/lib/clamav/yara-rules-{{ yara_forge_variant }}-stripped.yar.bak
            state: absent
    # Debian uses --move=/root/quarantine
    #- name: mkdir /root/quarantine
    #  ansible.builtin.file:
    #    path: /root/quarantine
    #    state: directory
    #    owner: root
    #    group: root
    #    mode: '0700'
    # https://docs.clamav.net/manual/OnAccess.html
    # This is disabled for now because of "ERROR: ClamInotif: could not watch path '/home/pyllyukko', Invalid argument"
    - name: Stop & disable ClamAV's On-Access service (Debian)
      when: ansible_facts['distribution'] == "Debian" and ansible_facts['architecture'] not in ["x86_64", "aarch64"]
      tags:
        - debian
        - services
      ansible.builtin.service:
        name: clamav-clamonacc
        state: stopped
        enabled: false

# This needs to happen only after the ClamAV confs have been created
- name: ClamAV services
  # Only for the upstream package
  when: ansible_facts['distribution'] in ["Debian", "Kali", "Ubuntu"] and ansible_facts['architecture'] in ["x86_64", "aarch64"]
  become: true
  tags:
    - services
    - molecule-idempotence-notest
    - clamav
    - debian
  block:
    # The clamav-daemon.service unit has
    #   ConditionPathExistsGlob=@DATADIR@/main.{c[vl]d,inc}
    # so systemd silently skips starting the unit if no signature DB exists.
    # Bootstrap with a one-shot freshclam only when the DB is missing; after
    # that the clamav-freshclam systemd service handles ongoing updates.
    - name: Check whether ClamAV main signature DB exists
      ansible.builtin.find:
        paths: "{{ clamav.database }}"
        patterns:
          - 'main.cvd'
          - 'main.cld'
          - 'main.inc'
      register: clamav_main_db
      tags: check
    - name: Run freshclam to bootstrap signature DB
      ansible.builtin.command: /usr/local/bin/freshclam
      when: clamav_main_db.matched == 0
      changed_when: true
    # Debian does this another way. It has /etc/systemd/system/clamav-daemon.service.d/extend.conf that contains:
    #
    # [Service]
    # ExecStartPre=-/bin/mkdir -p /run/clamav
    # ExecStartPre=/bin/chown clamav /run/clamav
    - name: ClamAV tmpfiles.d
      tags: configuration
      block:
        - name: mkdir /etc/tmpfiles.d
          ansible.builtin.file:
            path: /etc/tmpfiles.d
            state: directory
            owner: root
            group: root
            mode: '0755'
        - name: Create /etc/tmpfiles.d/clamav.conf
          ansible.builtin.template:
            src: clamav.conf.tmpfiles.j2
            dest: /etc/tmpfiles.d/clamav.conf
            owner: root
            group: root
            mode: '0644'
    - name: Download ClamAV systemd services
      ansible.builtin.get_url:
        url: "https://raw.githubusercontent.com/Cisco-Talos/clamav/refs/heads/main/{{ item }}.in"
        dest: /etc/systemd/system/{{ item | basename }}
        owner: root
        group: root
        mode: '0644'
      with_items:
        - clamd/clamav-daemon.service
        - freshclam/clamav-freshclam.service
    - name: Configure ClamAV /etc/systemd/system/clamav-daemon.service
      ansible.builtin.replace:
        path: '/etc/systemd/system/clamav-daemon.service'
        regexp: '{{ item.key }}'
        replace: '{{ item.value }}'
      with_dict:
        "@DATADIR@": "{{ clamav['database'] }}"
        "@prefix@": /usr/local
        # The upstream ClamAV package is not linked against systemd, so the systemd socket activation conflicts with clamd
        '^(Requires=clamav-daemon\.socket)$': '#\g<1>'
        '^(Also=clamav-daemon\.socket)$': '#\g<1>'
    - name: Configure ClamAV /etc/systemd/system/clamav-freshclam.service
      ansible.builtin.replace:
        path: '/etc/systemd/system/clamav-freshclam.service'
        regexp: '{{ item.key }}'
        replace: '{{ item.value }}'
      with_dict:
        "@prefix@": /usr/local
    # Reload systemd manager configuration once, after the unit files have been
    # downloaded and configured but before enabling/starting them. Pulled out
    # of the loop below so it does not fire once per item. Tagged molecule-notest
    # to match the Enable task -- Molecule containers do not run systemd and
    # have no systemctl binary, so this would otherwise fail there.
    - name: Reload systemd manager configuration
      tags: molecule-notest
      ansible.builtin.systemd_service:
        daemon_reload: true
    - name: Enable ClamAV systemd services
      tags: molecule-notest
      ansible.builtin.systemd_service:
        name: '{{ item }}'
        enabled: true
        state: started
      with_items:
        - clamav-freshclam.service
        - clamav-daemon.service

- name: Stat apparmor_parser
  ansible.builtin.stat:
    path: /sbin/apparmor_parser
  register: apparmor_parser_stat
  tags:
    - check
    - clamav
- name: ClamAV AppArmor upstream extras
  become: true
  tags:
    - clamav
    #- apparmor
  when:
    - ansible_facts['distribution'] in ["Debian", "Kali", "Ubuntu", "Slackware"]
    - apparmor_parser_stat.stat.exists
  block:
    - name: Download upstream AppArmor profile for clamd
      ansible.builtin.get_url:
        url: "{{ clamav_apparmor.clamd_url }}"
        dest: /etc/apparmor.d/usr.sbin.clamd
        owner: root
        group: root
        mode: '0644'
        checksum: "sha256:{{ clamav_apparmor.clamd_sha256 }}"
      register: clamav_apparmor_clamd_dl
    - name: Download upstream AppArmor profile for freshclam
      ansible.builtin.get_url:
        url: "{{ clamav_apparmor.freshclam_url }}"
        dest: /etc/apparmor.d/usr.bin.freshclam
        owner: root
        group: root
        mode: '0644'
        checksum: "sha256:{{ clamav_apparmor.freshclam_sha256 }}"
      register: clamav_apparmor_freshclam_dl
    - name: Ensure tunables/alias.d exists
      ansible.builtin.file:
        path: /etc/apparmor.d/tunables/alias.d
        state: directory
        owner: root
        group: root
        mode: '0755'
    - name: Ensure tunables/alias includes alias.d
      ansible.builtin.lineinfile:
        path: /etc/apparmor.d/tunables/alias
        line: include if exists <tunables/alias.d>
        state: present
    - name: Drop ClamAV AppArmor aliases
      ansible.builtin.template:
        src: apparmor.d/tunables/alias.d/clamav.j2
        dest: /etc/apparmor.d/tunables/alias.d/clamav
        owner: root
        group: root
        mode: '0644'
      register: clamav_apparmor_alias
    - name: Ensure local AppArmor overrides dir exists
      ansible.builtin.file:
        path: /etc/apparmor.d/local
        state: directory
        owner: root
        group: root
        mode: '0755'
    - name: Template local override for clamd
      ansible.builtin.template:
        src: apparmor.d/local/usr.sbin.clamd.j2
        dest: /etc/apparmor.d/local/usr.sbin.clamd
        owner: root
        group: root
        mode: '0644'
      register: clamav_apparmor_local_clamd
    - name: Template local override for freshclam
      ansible.builtin.template:
        src: apparmor.d/local/usr.bin.freshclam.j2
        dest: /etc/apparmor.d/local/usr.bin.freshclam
        owner: root
        group: root
        mode: '0644'
      register: clamav_apparmor_local_freshclam
    - name: Reload ClamAV AppArmor profiles
      ansible.builtin.command:
        cmd: >-
          /sbin/apparmor_parser -r
          /etc/apparmor.d/usr.sbin.clamd
          /etc/apparmor.d/usr.bin.freshclam
          /etc/apparmor.d/tunables/alias
      when:
        - clamav_apparmor_clamd_dl.changed or clamav_apparmor_freshclam_dl.changed or clamav_apparmor_alias.changed or clamav_apparmor_local_clamd.changed or clamav_apparmor_local_freshclam.changed
      changed_when: true

- name: clamav-unofficial-sigs
  become: true
  tags: clamav-unofficial-sigs
  block:
    - name: Stat /etc/clamav-unofficial-sigs
      ansible.builtin.stat:
        path: /etc/clamav-unofficial-sigs
      register: clamav_unofficial_sigs
      tags: check
    - name: Copy os.conf
      ansible.builtin.template:
        src: os.slackware.conf.j2
        dest: /etc/clamav-unofficial-sigs/os.conf
        owner: root
        group: root
        mode: '0644'
        backup: true
      when:
        - clamav_unofficial_sigs.stat.exists
        - ansible_facts['distribution'] == "Slackware"
